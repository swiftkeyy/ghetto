version: '3.9'

services:
  # ============================================================================
  # POSTGRESQL DATABASE
  # ============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: ghettovpn_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ghettovpn}
      POSTGRES_USER: ${POSTGRES_USER:-ghettovpn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ghettovpn}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ghettovpn_network

  # ============================================================================
  # REDIS CACHE
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: ghettovpn_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - ghettovpn_network

  # ============================================================================
  # BACKEND API + BOT
  # ============================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: 3.12
    container_name: ghettovpn_backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - vpn_configs:/app/configs
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ghettovpn_network

  # ============================================================================
  # CELERY WORKER (Background Tasks)
  # ============================================================================
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ghettovpn_celery_worker
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - vpn_configs:/app/configs
      - ./logs:/app/logs
    depends_on:
      - postgres
      - redis
      - backend
    command: celery -A src.core.celery_app worker --loglevel=info --concurrency=4
    networks:
      - ghettovpn_network

  # ============================================================================
  # CELERY BEAT (Scheduled Tasks)
  # ============================================================================
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ghettovpn_celery_beat
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./logs:/app/logs
    depends_on:
      - postgres
      - redis
      - backend
    command: celery -A src.core.celery_app beat --loglevel=info
    networks:
      - ghettovpn_network

  # ============================================================================
  # ADMIN PANEL (Next.js)
  # ============================================================================
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        NODE_VERSION: 20
    container_name: ghettovpn_admin
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://backend:8000
    volumes:
      - ./admin:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: npm run start
    networks:
      - ghettovpn_network

  # ============================================================================
  # NGINX (Reverse Proxy)
  # ============================================================================
  nginx:
    image: nginx:alpine
    container_name: ghettovpn_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - admin
    networks:
      - ghettovpn_network

  # ============================================================================
  # PROMETHEUS (Metrics)
  # ============================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: ghettovpn_prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    ports:
      - "9090:9090"
    networks:
      - ghettovpn_network

  # ============================================================================
  # GRAFANA (Dashboards)
  # ============================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: ghettovpn_grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - ghettovpn_network

  # ============================================================================
  # LOKI (Log Aggregation)
  # ============================================================================
  loki:
    image: grafana/loki:latest
    container_name: ghettovpn_loki
    restart: unless-stopped
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - ghettovpn_network

  # ============================================================================
  # PROMTAIL (Log Collector)
  # ============================================================================
  promtail:
    image: grafana/promtail:latest
    container_name: ghettovpn_promtail
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - ./logs:/var/log/ghettovpn:ro
      - /var/log:/var/log:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - ghettovpn_network

# ============================================================================
# NETWORKS
# ============================================================================
networks:
  ghettovpn_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  vpn_configs:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local
